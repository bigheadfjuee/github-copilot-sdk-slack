version: '3.8'

services:
  slack-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-copilot-sdk-slack
    ports:
      - "3000:3000"
    environment:
      # 連接模式配置
      CONNECTION_MODE: ${CONNECTION_MODE:-http}
      
      # Slack 認證
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      
      # HTTP 配置
      HTTP_PORT: 3000
      HTTP_PATH: ${HTTP_PATH:-/slack/events}
      
      # HTTP Proxy 配置（可選）
      HTTP_PROXY_URL: ${HTTP_PROXY_URL}
      HTTP_PROXY_USERNAME: ${HTTP_PROXY_USERNAME}
      HTTP_PROXY_PASSWORD: ${HTTP_PROXY_PASSWORD}
      
      # 日誌和應用配置
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    
    # 重啟策略
    restart: unless-stopped
    
    # 資源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # 日誌配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 健康檢查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# 可選：使用 docker-compose up -d 啟動
# 編輯 .env 文件填入必要的環境變數
